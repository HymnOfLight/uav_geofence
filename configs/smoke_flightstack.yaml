# Smoke config for the flight-stack integration: synthetic data generated by
# the PX4 behavioral geofence teacher, with the ArduPilot behavioral fence as
# an extra Monte Carlo baseline. Same reduced scale as smoke.yaml; results are
# for pipeline checking only, never for paper conclusions.
seed: 42
environment:
  dt: 0.05
  integration_dt: 0.01
  vmax: 8.0
  amax: 4.0
  position_scale: 50.0
  world_min: [-80.0, -80.0]
  world_max: [80.0, 80.0]
  goal: [60.0, 0.0]
  forbidden_box: [-5.0, 5.0, -12.0, 12.0]
  safety_margin: 1.0
data:
  source: synthetic
teacher:
  backend: px4          # builtin | px4 | ardupilot
  params: {}            # e.g. mpc_xy_p, mpc_dec_hor_max, gf_predict, ...
training:
  hidden: [16, 16]
  samples: 5000
  epochs: 120
  batch_size: 256
  learning_rate: 0.002
  weight_decay: 0.00001
  qscale: 32
verification:
  workers: 1
  e0_inputs: 50
  grid_cells: 16
  cell_width: 0.5
  boundary_band: 8.0
  timeout_ms: 1000
  horizon_steps: 20
  max_refinement_depth: 2
  initial_box: [-25.0, -15.0, -6.0, 6.0, 1.0, 5.0, -1.0, 1.0]
simulation:
  episodes: 100
  steps: 400
  wind_bound: 0.25
  localization_error: 0.25
  shield_horizon: 20
  controllers: [teacher, px4, ardupilot, float, int8, int8_shield]
